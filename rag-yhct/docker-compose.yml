services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    depends_on:
      - qdrant
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    command: ["uv", "run", "python", "-m", "rag.pipeline.run_step0_4", "--config", "config/config.yaml"]

volumes:
  ollama_data:
